name: Desktop - Post Notarize Staple

on:
  workflow_run:
    workflows: ['Desktop - Lint/Format + Build Packages']
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source desktop-build workflow run id'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  staple_macos:
    name: Staple DMG (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == null) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    env:
      HAS_DO_SPACES: ${{ secrets.DO_SPACES_KEY != '' && secrets.DO_SPACES_SECRET != '' && secrets.DO_SPACES_BUCKET != '' && secrets.DO_SPACES_REGION != '' }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - name: Resolve source run id
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source_run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source artifact
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve.outputs.source_run_id }}
          name: passwall-desktop-macos-${{ matrix.arch }}
          path: incoming/${{ matrix.arch }}

      - name: Locate DMG and submission id
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$(find "incoming/${{ matrix.arch }}" -name '*.dmg' -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "DMG not found in source artifact"
            exit 1
          fi

          SUBMISSION_FILE="incoming/${{ matrix.arch }}/notary-submission-${{ matrix.arch }}.txt"
          if [ ! -f "$SUBMISSION_FILE" ]; then
            echo "Notary submission file not found: $SUBMISSION_FILE"
            echo "Source run probably had notarization disabled/failed before submission."
            exit 1
          fi

          SUBMISSION_ID="$(tr -d '\n\r ' < "$SUBMISSION_FILE")"
          if [ -z "$SUBMISSION_ID" ]; then
            echo "Submission id is empty in $SUBMISSION_FILE"
            exit 1
          fi

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for notarization acceptance
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          SUBMISSION_ID="${{ steps.locate.outputs.submission_id }}"
          DEADLINE=$((SECONDS + 7200))

          echo "Polling notarization status for submission: $SUBMISSION_ID"

          while true; do
            INFO_OUTPUT="$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID")"

            echo "$INFO_OUTPUT"
            STATUS="$(echo "$INFO_OUTPUT" | awk -F': ' '/status:/ { print $2; exit }')"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted."
              break
            fi

            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              exit 1
            fi

            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "Notarization polling timeout reached."
              exit 124
            fi

            sleep 30
          done

      - name: Staple and validate DMG
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="${{ steps.locate.outputs.dmg_path }}"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "Stapled DMG ready at $DMG_PATH"
          echo "STAPLED_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Publish stapled DMG to DigitalOcean Spaces
        if: ${{ env.HAS_DO_SPACES == 'true' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_PREFIX: ${{ secrets.DO_SPACES_PREFIX }}
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi

          PREFIX="${DO_SPACES_PREFIX:-desktop/stable}"
          ENDPOINT="${DO_SPACES_ENDPOINT:-${DO_SPACES_REGION}.digitaloceanspaces.com}"
          TARGET="s3://${DO_SPACES_BUCKET}/${PREFIX}/darwin/${{ matrix.arch }}/$(basename "$STAPLED_PATH")"

          aws s3 cp "$STAPLED_PATH" "$TARGET" \
            --acl public-read \
            --endpoint-url "https://${ENDPOINT}"

      - name: Upload stapled artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-macos-${{ matrix.arch }}
          path: ${{ env.STAPLED_PATH }}

  delete_unsigned_artifacts:
    name: Delete Original Unstapled macOS Artifacts
    needs: staple_macos
    if: ${{ needs.staple_macos.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Resolve source run id
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source_run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete original macOS artifacts from source run
        uses: actions/github-script@v7
        with:
          script: |
            const runId = Number('${{ steps.resolve.outputs.source_run_id }}')
            const names = new Set(['passwall-desktop-macos-x64', 'passwall-desktop-macos-arm64'])
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: 100
              }
            )

            for (const artifact of artifacts) {
              if (!names.has(artifact.name)) continue
              core.info(`Deleting artifact ${artifact.name} (id=${artifact.id})`)
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              })
            }
