name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
  DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
  DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
  DO_SPACES_CDN_URL: https://passwall-releases.nyc3.cdn.digitaloceanspaces.com

jobs:
  build:
    # Release artifacts must use Vite production mode (import.meta.env.DEV === false) and Rust --release.
    env:
      CI: true
      NODE_ENV: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
            updater_target: darwin-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
            updater_target: darwin-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
            updater_target: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
            updater_target: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Verify native messaging manifest origin pin
        run: pnpm verify:native-manifest

      - name: Build Tauri app
        env:
          NODE_ENV: production
          CI: true
          # Avoid accidentally treating CI like a remote `tauri dev` host (vite.config server.hmr).
          TAURI_DEV_HOST: ""
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.CSC_LINK || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: pnpm exec tauri build --ci --target ${{ matrix.target }}

      - name: Collect updater artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true

      - name: Collect updater artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true

      - name: Collect updater artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.nsis.zip" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.nsis.zip.sig" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi.zip" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi.zip.sig" artifacts\ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.updater_target }}
          path: artifacts/
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-latest
    name: Upload to DO Spaces

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Install s3cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd

      - name: Configure s3cmd
        run: |
          cat > ~/.s3cfg << 'HEREDOC'
          [default]
          access_key = ${{ secrets.DO_SPACES_KEY }}
          secret_key = ${{ secrets.DO_SPACES_SECRET }}
          host_base = ${{ secrets.DO_SPACES_ENDPOINT }}
          host_bucket = %(bucket)s.${{ secrets.DO_SPACES_ENDPOINT }}
          use_https = True
          signature_v2 = True
          HEREDOC

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to DO Spaces
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUCKET="${{ secrets.DO_SPACES_BUCKET }}"

          for dir in all-artifacts/artifacts-*; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME..."
              s3cmd put "$file" \
                "s3://${BUCKET}/desktop/${VERSION}/${FILENAME}" \
                --acl-public \
                --guess-mime-type
            done
          done

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CDN_URL="${DO_SPACES_CDN_URL}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Helper: find the updater bundle + signature for a platform
          read_sig() {
            local sig_file="$1"
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          find_bundle() {
            local dir="$1"
            local pattern="$2"
            find "$dir" -name "$pattern" -not -name "*.sig" 2>/dev/null | head -1
          }

          # macOS ARM64
          MACOS_ARM_BUNDLE=$(find_bundle "all-artifacts/artifacts-darwin-aarch64" "*.app.tar.gz")
          MACOS_ARM_SIG=""
          MACOS_ARM_URL=""
          if [ -n "$MACOS_ARM_BUNDLE" ]; then
            MACOS_ARM_SIG=$(read_sig "${MACOS_ARM_BUNDLE}.sig")
            MACOS_ARM_URL="${CDN_URL}/desktop/${VERSION}/$(basename "$MACOS_ARM_BUNDLE")"
          fi

          # macOS x86_64
          MACOS_X64_BUNDLE=$(find_bundle "all-artifacts/artifacts-darwin-x86_64" "*.app.tar.gz")
          MACOS_X64_SIG=""
          MACOS_X64_URL=""
          if [ -n "$MACOS_X64_BUNDLE" ]; then
            MACOS_X64_SIG=$(read_sig "${MACOS_X64_BUNDLE}.sig")
            MACOS_X64_URL="${CDN_URL}/desktop/${VERSION}/$(basename "$MACOS_X64_BUNDLE")"
          fi

          # Linux x86_64
          LINUX_BUNDLE=$(find_bundle "all-artifacts/artifacts-linux-x86_64" "*.AppImage.tar.gz")
          LINUX_SIG=""
          LINUX_URL=""
          if [ -n "$LINUX_BUNDLE" ]; then
            LINUX_SIG=$(read_sig "${LINUX_BUNDLE}.sig")
            LINUX_URL="${CDN_URL}/desktop/${VERSION}/$(basename "$LINUX_BUNDLE")"
          fi

          # Windows x86_64
          WINDOWS_BUNDLE=$(find_bundle "all-artifacts/artifacts-windows-x86_64" "*.nsis.zip")
          if [ -z "$WINDOWS_BUNDLE" ]; then
            WINDOWS_BUNDLE=$(find_bundle "all-artifacts/artifacts-windows-x86_64" "*.msi.zip")
          fi
          WINDOWS_SIG=""
          WINDOWS_URL=""
          if [ -n "$WINDOWS_BUNDLE" ]; then
            WINDOWS_SIG=$(read_sig "${WINDOWS_BUNDLE}.sig")
            WINDOWS_URL="${CDN_URL}/desktop/${VERSION}/$(basename "$WINDOWS_BUNDLE")"
          fi

          # Build latest.json
          python3 -c "
          import json, sys
          platforms = {}
          entries = [
              ('darwin-aarch64', '''${MACOS_ARM_URL}''', '''${MACOS_ARM_SIG}'''),
              ('darwin-x86_64',  '''${MACOS_X64_URL}''', '''${MACOS_X64_SIG}'''),
              ('linux-x86_64',   '''${LINUX_URL}''',     '''${LINUX_SIG}'''),
              ('windows-x86_64', '''${WINDOWS_URL}''',   '''${WINDOWS_SIG}'''),
          ]
          for target, url, sig in entries:
              if url.strip() and sig.strip():
                  platforms[target] = {'url': url.strip(), 'signature': sig.strip()}
          data = {
              'version': '${VERSION}',
              'notes': 'Passwall Desktop ${VERSION}',
              'pub_date': '${PUB_DATE}',
              'platforms': platforms,
          }
          json.dump(data, sys.stdout, indent=2)
          " > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to DO Spaces
        run: |
          BUCKET="${{ secrets.DO_SPACES_BUCKET }}"
          s3cmd put latest.json \
            "s3://${BUCKET}/desktop/latest.json" \
            --acl-public \
            --mime-type="application/json" \
            --add-header="Cache-Control: no-cache, max-age=0"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Passwall Desktop ${{ steps.version.outputs.tag }}"
          body: |
            ## Passwall Desktop ${{ steps.version.outputs.tag }}

            Download the installer for your platform from the assets below or from the [CDN](https://passwall-releases.nyc3.cdn.digitaloceanspaces.com/desktop/${{ steps.version.outputs.version }}/).
          files: all-artifacts/**/*
          draft: false
          prerelease: false
