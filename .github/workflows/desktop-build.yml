name: Desktop - Lint/Format + Build Packages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci

  windows:
    name: Windows (${{ matrix.arch }}) - MSI
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch: [ia32, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MSI
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if ("${{ matrix.arch }}" -eq "ia32") { pnpm run ci:build:win:ia32 } else { pnpm run ci:build:win:x64 }

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-windows-${{ matrix.arch }}
          path: |
            build/*.msi

  macos:
    name: macOS (${{ matrix.arch }}) - DMG
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        if: ${{ env.CSC_LINK != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$CSC_LINK" | base64 -d > $RUNNER_TEMP/certificate.p12 || echo "$CSC_LINK" | base64 -D > $RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}
        run: |
          pnpm run build:renderer && pnpm run build:main
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac dmg --arm64 --publish never
          else
            npx electron-builder --mac dmg --x64 --publish never
          fi

      - name: Notarize DMG
        if: ${{ env.HAS_APPLE_NOTARY == 'true' }}
        timeout-minutes: 15
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="$(find build -name '*.dmg' -print -quit)"
          if [ -n "$DMG_PATH" ] && [ -n "$APPLE_ID" ]; then
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 10m
            xcrun stapler staple "$DMG_PATH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-macos-${{ matrix.arch }}
          path: |
            build/*.dmg

  linux:
    name: Linux (${{ matrix.arch }}) - DEB/RPM
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable QEMU for arm64 (cross-build)
        if: ${{ matrix.arch == 'arm64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (deb + rpm)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            pnpm run ci:build:linux:arm64
          else
            pnpm run ci:build:linux:x64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-linux-${{ matrix.arch }}
          path: |
            build/*.deb
            build/*.rpm
