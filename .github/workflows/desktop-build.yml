name: Desktop - Lint/Format + Build Packages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci

  windows:
    name: Windows (${{ matrix.arch }}) - MSI
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      HAS_DO_SPACES: ${{ secrets.DO_SPACES_KEY != '' && secrets.DO_SPACES_SECRET != '' && secrets.DO_SPACES_BUCKET != '' && secrets.DO_SPACES_REGION != '' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [ia32, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MSI
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if ("${{ matrix.arch }}" -eq "ia32") { pnpm run ci:build:win:ia32 } else { pnpm run ci:build:win:x64 }

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-windows-${{ matrix.arch }}
          path: |
            build/*.msi

      - name: Publish Windows artifacts to DigitalOcean Spaces
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_DO_SPACES == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_PREFIX: ${{ secrets.DO_SPACES_PREFIX }}
        run: |
          if (-not (Get-Command aws -ErrorAction SilentlyContinue)) {
            choco install awscli -y
          }

          $prefix = if ($env:DO_SPACES_PREFIX) { $env:DO_SPACES_PREFIX } else { "desktop/stable" }
          $endpoint = if ($env:DO_SPACES_ENDPOINT) { $env:DO_SPACES_ENDPOINT } else { "$($env:DO_SPACES_REGION).digitaloceanspaces.com" }
          $target = "s3://$($env:DO_SPACES_BUCKET)/$prefix/windows/${{ matrix.arch }}"

          aws s3 cp build $target `
            --recursive `
            --exclude "*" `
            --include "*.msi" `
            --acl public-read `
            --endpoint-url "https://$endpoint"

  macos:
    name: macOS (${{ matrix.arch }}) - DMG
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_DO_SPACES: ${{ secrets.DO_SPACES_KEY != '' && secrets.DO_SPACES_SECRET != '' && secrets.DO_SPACES_BUCKET != '' && secrets.DO_SPACES_REGION != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        if: ${{ env.CSC_LINK != '' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$CSC_LINK" | base64 -d > $RUNNER_TEMP/certificate.p12 || echo "$CSC_LINK" | base64 -D > $RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' && 'true' || 'false' }}
          PASSWALL_UPDATES_URL: ${{ secrets.PASSWALL_UPDATES_URL_BASE != '' && format('{0}/{1}', secrets.PASSWALL_UPDATES_URL_BASE, matrix.arch) || '' }}
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]] && [ -z "$PASSWALL_UPDATES_URL" ]; then
            echo "PASSWALL_UPDATES_URL_BASE secret is required for macOS release builds."
            exit 1
          fi

          pnpm run build:renderer && pnpm run build:main
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac dmg zip --arm64 --publish never
          else
            npx electron-builder --mac dmg zip --x64 --publish never
          fi

      - name: Notarize DMG
        if: ${{ env.HAS_APPLE_NOTARY == 'true' }}
        timeout-minutes: 10
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="$(find build -name '*.dmg' -print -quit)"
          if [ -n "$DMG_PATH" ] && [ -n "$APPLE_ID" ]; then
            SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID")"

            echo "$SUBMIT_OUTPUT"

            SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | awk '/id:/ { print $2; exit }')"
            if [ -z "$SUBMISSION_ID" ]; then
              echo "Failed to parse notary submission id"
              exit 1
            fi
            echo "$SUBMISSION_ID" > "build/notary-submission-${{ matrix.arch }}.txt"
            echo "Notary submission queued: $SUBMISSION_ID"
            echo "Notarization will continue asynchronously; pipeline won't wait for completion."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-macos-${{ matrix.arch }}
          path: |
            build/*.dmg
            build/*.zip
            build/*.blockmap
            build/latest-mac.yml
            build/notary-submission-${{ matrix.arch }}.txt

      - name: Publish macOS artifacts to DigitalOcean Spaces
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_DO_SPACES == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_PREFIX: ${{ secrets.DO_SPACES_PREFIX }}
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi

          PREFIX="${DO_SPACES_PREFIX:-desktop/stable}"
          ENDPOINT="${DO_SPACES_ENDPOINT:-${DO_SPACES_REGION}.digitaloceanspaces.com}"
          TARGET="s3://${DO_SPACES_BUCKET}/${PREFIX}/darwin/${{ matrix.arch }}"

          aws s3 cp build "$TARGET" \
            --recursive \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.blockmap" \
            --include "latest-mac.yml" \
            --acl public-read \
            --endpoint-url "https://${ENDPOINT}"

  linux:
    name: Linux (${{ matrix.arch }}) - DEB/RPM
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      HAS_DO_SPACES: ${{ secrets.DO_SPACES_KEY != '' && secrets.DO_SPACES_SECRET != '' && secrets.DO_SPACES_BUCKET != '' && secrets.DO_SPACES_REGION != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable QEMU for arm64 (cross-build)
        if: ${{ matrix.arch == 'arm64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (deb + rpm)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            pnpm run ci:build:linux:arm64
          else
            pnpm run ci:build:linux:x64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: passwall-desktop-linux-${{ matrix.arch }}
          path: |
            build/*.deb
            build/*.rpm

      - name: Publish Linux artifacts to DigitalOcean Spaces
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.HAS_DO_SPACES == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          DO_SPACES_PREFIX: ${{ secrets.DO_SPACES_PREFIX }}
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          PREFIX="${DO_SPACES_PREFIX:-desktop/stable}"
          ENDPOINT="${DO_SPACES_ENDPOINT:-${DO_SPACES_REGION}.digitaloceanspaces.com}"
          TARGET="s3://${DO_SPACES_BUCKET}/${PREFIX}/linux/${{ matrix.arch }}"

          aws s3 cp build "$TARGET" \
            --recursive \
            --exclude "*" \
            --include "*.deb" \
            --include "*.rpm" \
            --acl public-read \
            --endpoint-url "https://${ENDPOINT}"
